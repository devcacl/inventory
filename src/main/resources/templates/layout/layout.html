<!DOCTYPE html>
<html lang="en">
<head th:fragment="head">
    <meta charset="UTF-8">
    <title>Enterprise Management System</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        .glass-panel{
            background: rgba(20,20,20,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .menu-shell{
            border: 1px solid rgba(255,255,25,0.35);
            border-radius: 28px;
            background: rgba(0,0,0,0.20);
        }

        .active-item{
            background: linear-gradient(90deg,#ff163d 0%,#ff375f 100%);
            color: white;
            box-shadow: 0 6px 18px rgba(255,255,255,0.10);
        }

        .menu-item:hover{
            background: rgba(255,255,255,0.10);
        }
    </style>
</head>

<body>
    <aside th:fragment = "sidebar" class="w-[250px] min-h-screen text-white glass-panel flex flex-col justify-start shadow-2xl">
      <div class="flex items-center gap-2 text-sm font-medium text-white/90 mb-3">
          <span class="w-3 h-3 rounded-full bg-green-400 inline-block"></span>
          <span>ACTIVE</span>
      </div>
        <div class="bg-black/45 rounded-[28px] p-5 text-center border border-white/10">
        <p class="text-sm tracking-[0.2em] text-white/85">Admin</p>
        <div class="w-16 h-16 mx-auto mt-3 rounded-full bg-cyan-400 flex items-center justify-center text 2xl text-slate-800">
            <i class="fa-solid fa-user-tie"></i>
        </div>
        <p class="mt-3 text-sm text-white/80">Administrador</p>
        <h2 class="text-3xl tracking-[0.25em] font-light">Tesla</h2>
        </div>


    </aside>

</body>
</html>
